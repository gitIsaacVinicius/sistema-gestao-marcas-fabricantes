<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcas e Fabricantes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh; margin: 0;">

    <div class="card" style="background-color: #082C38; border-radius: 0;">
        <h5 class="card-header" style="color: white; border-radius: 0;">Marcas e Fabricantes</h5>
    </div>
    
    <div class="container" style="flex: 1;">
        <nav class="navbar bg-white">
            <form class="w-75 mx-auto" role="search" id="formBusca">
                <div class="input-group">
                    <span class="input-group-text" style="background-color: #FCD8B4; border-right: none;"><i class="bi bi-search"></i></span>
                    <input class="form-control" style="background-color: #FCD8B4; border-left: none;" type="search" placeholder="Buscar nome do fabricante ou marca" aria-label="Pesquisar" id="inputBusca"/>
                </div>
            </form>
        </nav>
        
        <br>
        
        <table class="table table-hover" id="tabelaMarcasFabricantes">
            <thead>
                <tr>
                <th scope="col">Fabricante</th>
                <th scope="col">Marca</th>
                <th scope="col">Logotipo</th>
                </tr>
            </thead>
            <tbody id="tabelaBody">
                <!-- Dados carregados via JavaScript -->
            </tbody>
        </table>

        <div id="mensagemVazia" class="text-center text-muted py-4" style="display: none;">
            Nenhuma marca ou fabricante ativo encontrado.
        </div>
    </div>

    <footer style="background-color: #082C38; color: white; border-radius: 0; min-height: 2rem;">
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <script>
        let dadosCompletos = []; // armazena todos os dados para filtro local

        // Carrega os dados ao abrir a página
        document.addEventListener('DOMContentLoaded', carregarDados);

        async function carregarDados() {
            try {
                // Chama as duas rotas existentes em paralelo
                const resFabricantes = await fetch('/api/fabricantes');
                const resMarcas = await fetch('/api/marcas');

                if (!resFabricantes.ok || !resMarcas.ok) throw new Error('Erro na requisição');

                const fabricantes = await resFabricantes.json();
                const marcas = await resMarcas.json();

                // Cria um mapa de fabricantes por ID para associar com as marcas
                const mapaFabricantes = {};
                for (let f = 0; f < fabricantes.length; f++) {
                    mapaFabricantes[fabricantes[f].idFabricante] = fabricantes[f].nome_fabricante;
                }

                // Combina marcas com o nome do fabricante correspondente
                dadosCompletos = [];
                for (let m = 0; m < marcas.length; m++) {
                    dadosCompletos.push({
                        nome_fabricante: mapaFabricantes[marcas[m].fk_idFabricante] || 'Fabricante não encontrado',
                        nome_marca: marcas[m].nome_marca,
                        logotipo_marca: marcas[m].logotipo_marca
                    });
                }

                renderizarTabela(dadosCompletos);
            } catch (error) {
                console.error('Erro ao carregar dados:', error);
                document.getElementById('tabelaBody').innerHTML =
                    '<tr><td colspan="3" class="text-center text-danger">' +
                    'Erro ao carregar dados. Verifique se o servidor está rodando.' +
                    '</td></tr>';
            }
        }

        function renderizarTabela(dados) {
            const tbody = document.getElementById('tabelaBody');
            const mensagemVazia = document.getElementById('mensagemVazia');

            if (dados.length === 0) {
                tbody.innerHTML = '';
                mensagemVazia.style.display = 'block';
                return;
            }

            mensagemVazia.style.display = 'none';

            // Agrupa marcas por fabricante (mantendo a ordem de aparição)
            const agrupado = [];
            const mapaGrupos = {};

            for (let i = 0; i < dados.length; i++) {
                const item = dados[i];
                if (!mapaGrupos[item.nome_fabricante]) {
                    mapaGrupos[item.nome_fabricante] = { nome_fabricante: item.nome_fabricante, marcas: [] };
                    agrupado.push(mapaGrupos[item.nome_fabricante]);
                }
                mapaGrupos[item.nome_fabricante].marcas.push(item);
            }

            let html = '';

            for (let g = 0; g < agrupado.length; g++) {
                const grupo = agrupado[g];
                const totalMarcas = grupo.marcas.length;

                for (let j = 0; j < totalMarcas; j++) {
                    const marca = grupo.marcas[j];

                    // Na primeira marca do grupo, adiciona classe separadora e Fabricante com rowspan
                    if (j === 0) {
                        html += '<tr>';
                        html += '<td rowspan="' + totalMarcas + '" class="align-middle">' + marca.nome_fabricante + '</td>';
                    } else {
                        html += '<tr>';
                    }

                    html += '<td>' + marca.nome_marca + '</td>';

                    if (marca.logotipo_marca) {
                        html += '<td><img src="' + marca.logotipo_marca + '" alt="Logo ' + marca.nome_marca + '" style="max-height: 40px; max-width: 80px; object-fit: contain;"></td>';
                    } else {
                        html += '<td><span class="text-muted">—</span></td>';
                    }

                    html += '</tr>';
                }
            }

            tbody.innerHTML = html;
        }

        // Busca/filtro local
        document.getElementById('formBusca').addEventListener('submit', function(e) {
            e.preventDefault();
            filtrarDados();
        });

        document.getElementById('inputBusca').addEventListener('input', filtrarDados);

        function filtrarDados() {
            const termo = document.getElementById('inputBusca').value.toLowerCase().trim();

            if (!termo) {
                renderizarTabela(dadosCompletos);
                return;
            }

            const filtrados = [];
            for (let i = 0; i < dadosCompletos.length; i++) {
                const item = dadosCompletos[i];
                if (item.nome_fabricante.toLowerCase().includes(termo) ||
                    item.nome_marca.toLowerCase().includes(termo)) {
                    filtrados.push(item);
                }
            }

            renderizarTabela(filtrados);
        }
    </script>

</body>
</html>
