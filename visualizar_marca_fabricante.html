<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcas e Fabricantes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body style="display: flex; flex-direction: column; min-height: 100vh; margin: 0;">

    <div class="card" style="background-color: #082C38; border-radius: 0;">
        <h5 class="card-header" style="color: white; border-radius: 0;">Marcas e Fabricantes</h5>
    </div>
    
    <div class="container" style="flex: 1;">
        <nav class="navbar bg-body-tertiary">
            <form class="d-flex w-75 mx-auto" role="search">
                <input class="form-control me-2" style="background-color: #FCD8B4;" type="search" placeholder="Buscar nome do fabricante ou marca" aria-label="Pesquisar"/>
                <button class="btn btn-outline-success" type="submit">Buscar</button>
            </form>
        </nav>
        
        <br>
        
        <table class="table">
            <thead>
                <tr>
                <th scope="col">#</th>
                <th scope="col">Fabricante</th>
                <th scope="col">Marca</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                <th scope="row">1</th>
                <td></td>
                <td></td>
                <td></td>
                </tr>
                <tr>
                <th scope="row">2</th>
                <td></td>
                <td></td>
                <td></td>
                </tr>
            </tbody>
        </table>
    </div>

    <footer style="background-color: #082C38; color: white; border-radius: 0; min-height: 2rem;">
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
