<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Marca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container">
    
    <strong>Cadastro de Marca</strong>
    <br>
    <br>

    <strong>Informações para identificação</strong>

    <br>
    <br>

    <form>
        <div class="row mb-3">
            <label for="inputNome" class="col-sm-2 col-form-label">Nome</label>
            <div class="col-sm-4">
                <input type="text" class="form-control" id="inputNome" placeholder="" required>
            </div>
        </div>

        <div class="mb-3">
            <input class="form-control" type="file" id="formFile" accept="image/*">
            <label for="formFile" class="form-label">Formato suportado jpg/jpeg, png ou svg.</label>
        </div>
    </form>

    <hr>

    <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="checkDefault" required>
            <label class="form-check-label" for="checkDefault">
                Eu li e concordo com os Termos de Serviços, Políticas de Privacidade
            </label>
        </div>

        <br>
        
        <div class="col-12">
            <button class="btn btn-primary" type="submit">Enviar</button>
        </div>
        
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
