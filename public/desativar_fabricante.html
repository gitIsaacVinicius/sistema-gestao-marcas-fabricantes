<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desativar Fabricante</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body style="display: flex; flex-direction: column; min-height: 100vh; margin: 0;">

    <div class="card" style="background-color: #082C38; border-radius: 0;">
        <h5 class="card-header" style="color: white; border-radius: 0;">Desativar Fabricante</h5>
    </div>

    <div class="container mt-4" style="flex: 1;">
        <div class="alert alert-warning" role="alert">
            <strong>Atenção:</strong> Ao desativar este fabricante, todas as marcas associadas também serão desativadas.
        </div>

        <form id="formDesativarFabricante">
            <div class="mb-3">
                <label for="selectFabricante" class="form-label">Selecionar Fabricante para Desativar</label>
                <select class="form-select" id="selectFabricante" required>
                    <option value="" selected disabled>Escolha um fabricante...</option>
                </select>
                <div class="invalid-feedback">Por favor, selecione um fabricante.</div>
            </div>

            <div class="d-flex justify-content-end gap-2">
                <button type="button" class="btn btn-secondary" onclick="window.location.href='visualizar_marca_fabricante.html'">
                    Cancelar
                </button>
                <button type="submit" class="btn btn-danger" id="btnDesativar">
                    Avançar
                </button>
            </div>
        </form>
    </div>

    
    <div class="modal fade" id="confirmacaoModal" tabindex="-1" aria-labelledby="confirmacaoModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="confirmacaoModalLabel">Atenção</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    Confirmo que desejo desativar este fabricante e todas as suas marcas associadas
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Voltar</button>
                    <button type="button" class="btn btn-danger" id="btnConfirmarDesativar">Desativar</button>
                </div>
            </div>
        </div>
    </div>

    <footer style="background-color: #082C38; color: white; border-radius: 0; min-height: 2rem;">
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script>
        
        // Aguarda todo o documento HTML (DOM) ser carregado antes de executar os scripts.
        document.addEventListener('DOMContentLoaded', async function () {
            
            // Faz uma requisição GET para a API que busca todos os fabricantes cadastrados.
            const resFabricantes = await fetch('/api/fabricantes');
            
            // Se a requisição for bem-sucedida.
            if (resFabricantes.ok) {
                // Converte a resposta para um array de objetos JSON.
                const fabricantes = await resFabricantes.json();
                
                // Pega a referência da caixa de seleção (dropdown) no HTML.
                const selectFabricante = document.getElementById('selectFabricante');
                
                // Percorre a lista de fabricantes devolvida pelo backend.
                for (let i = 0; i < fabricantes.length; i++) {
                    const fab = fabricantes[i];
                    // Cria uma nova opção (<option>) dinamicamente para o select.
                    const option = document.createElement('option');
                    option.value = fab.idFabricante; // O valor oculto enviado no formulário será o ID.
                    option.textContent = fab.nome_fabricante; // O texto legível que aparece para o usuário.
                    // Adiciona essa opção dentro da tag <select>.
                    selectFabricante.appendChild(option);
                }
            }

            // Variável para armazenar a instância do Modal (Pop-up) do Bootstrap.
            let confirmacaoModal;

            
            document.getElementById('formDesativarFabricante').addEventListener('submit', function (e) {
                // Previne o envio nativo do formulário para evitar recarregar a tela.
                e.preventDefault();

                const selectFabricante = document.getElementById('selectFabricante');

                // Validação de segurança: verifica se o usuário de fato selecionou um fabricante válido.
                if (!selectFabricante.value) {
                    alert('Por favor, selecione um fabricante.');
                    return;
                }

                // Se o modal ainda não tiver sido inicializado, inicializa-o agora.
                if (!confirmacaoModal) {
                    confirmacaoModal = new bootstrap.Modal(document.getElementById('confirmacaoModal'));
                }
                // Exibe o modal na tela perguntando se o usuário tem certeza da ação.
                confirmacaoModal.show();
            });

            
            // CONFIRMAÇÃO E DESATIVAÇÃO (COMUNICAÇÃO COM O BACKEND)
            // Este evento é disparado quando o usuário clica no botão "Desativar" DENTRO do pop-up.
            document.getElementById('btnConfirmarDesativar').addEventListener('click', async function () {
                const selectFabricante = document.getElementById('selectFabricante');
                // Pega o ID do fabricante que está atualmente selecionado no dropdown e converte para número.
                const fabricanteId = parseInt(selectFabricante.value);
                const btnConfirmarDesativar = document.getElementById('btnConfirmarDesativar');
                // Guarda o texto original ("Desativar") para poder restaurá-lo depois.
                const originalText = btnConfirmarDesativar.innerHTML;

                // Desabilita o botão para impedir que o usuário clique várias vezes durante o processamento.
                btnConfirmarDesativar.disabled = true;
                // Muda o visual do botão, inserindo um ícone de carregamento (spinner).
                btnConfirmarDesativar.innerHTML = '<span class="spinner-border spinner-border-sm" role="status"></span> Desativando...';

                try {
                    // DESATIVAR O FABRICANTE (backend desativa as marcas em cascata)
                    const resUpdateFabricante = await fetch(`/api/fabricantes/${fabricanteId}`, {
                        method: 'DELETE'
                    });

                    // Se a desativação do fabricante for concluída com sucesso.
                    if (resUpdateFabricante.ok) {
                        // Esconde o pop-up de confirmação.
                        if (confirmacaoModal) confirmacaoModal.hide();
                        // Informa sucesso.
                        alert('Fabricante e suas marcas associadas foram desativados com sucesso!');
                        // Redireciona o usuário de volta para a lista geral.
                        window.location.href = 'visualizar_marca_fabricante.html';
                    } else {
                        // Trata erros vindos do endpoint do fabricante.
                        throw new Error('Erro ao desativar fabricante no servidor.');
                    }
                } catch (error) {
                    // Loga falhas (como rede ou erro no backend) e mostra na tela do usuário.
                    console.error('Erro completo:', error);
                    alert('Erro: ' + error.message);
                } finally {
                    // Esse bloco roda sempre (dando erro ou sucesso).
                    // Restaura o botão do pop-up ao normal caso a operação falhe e o usuário continue na página.
                    btnConfirmarDesativar.disabled = false;
                    btnConfirmarDesativar.innerHTML = originalText;
                }
            });
        });
    </script>
</body>
</html>
