<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desativar Marca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body style="display: flex; flex-direction: column; min-height: 100vh; margin: 0;">

    <div class="card" style="background-color: #082C38; border-radius: 0;">
        <h5 class="card-header" style="color: white; border-radius: 0;">Desativar Marca</h5>
    </div>

    <div class="container mt-4" style="flex: 1;">
        <div class="alert alert-warning" role="alert">
            <strong>Atenção:</strong> Ao desativar esta marca, ela não estará mais disponível no sistema.
        </div>

        <form id="formDesativarMarca">
            <div class="mb-3">
                <label for="selectFabricante" class="form-label">Selecionar Fabricante</label>
                <select class="form-select" id="selectFabricante" required>
                    <option value="" selected disabled>Escolha um fabricante...</option>
                </select>
                <div class="invalid-feedback">Por favor, selecione um fabricante.</div>
            </div>

            <div class="mb-3">
                <label for="selectMarca" class="form-label">Selecionar Marca para Desativar</label>
                <select class="form-select" id="selectMarca" required disabled>
                    <option value="" selected disabled>Primeiro escolha um fabricante...</option>
                </select>
                <div class="invalid-feedback">Por favor, selecione uma marca.</div>
            </div>

            <div class="d-flex justify-content-end gap-2">
                <button type="button" class="btn btn-secondary"
                    onclick="window.location.href='visualizar_marca_fabricante.html'">
                    Cancelar
                </button>
                <button type="submit" class="btn btn-danger" id="btnDesativar">
                    Avançar
                </button>
            </div>
        </form>
    </div>


    <div class="modal fade" id="confirmacaoModal" tabindex="-1" aria-labelledby="confirmacaoModalLabel"
        aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="confirmacaoModalLabel">Atenção</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    Confirmo que desejo desativar esta marca
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Voltar</button>
                    <button type="button" class="btn btn-danger" id="btnConfirmarDesativar">Desativar</button>
                </div>
            </div>
        </div>
    </div>

    <footer style="background-color: #082C38; color: white; border-radius: 0; min-height: 2rem;">
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script>
        // Array global para armazenar todas as marcas carregadas do banco de dados.
        // Evita ter que fazer uma nova requisição à API cada vez que o usuário troca de fabricante.
        let todasMarcas = [];

        // INICIALIZAÇÃO DA PÁGINA E CARREGAMENTO DE DADOS
        document.addEventListener('DOMContentLoaded', async function () {
            try {
                // 1. Carregar a lista de Fabricantes
                const resFabricantes = await fetch('/api/fabricantes');
                if (resFabricantes.ok) {
                    const fabricantes = await resFabricantes.json();
                    const selectFabricante = document.getElementById('selectFabricante');

                    // Preenche o primeiro dropdown (Fabricantes) com os dados recebidos.
                    for (let i = 0; i < fabricantes.length; i++) {
                        const fab = fabricantes[i];
                        const option = document.createElement('option');
                        option.value = fab.idFabricante;
                        option.textContent = fab.nome_fabricante;
                        selectFabricante.appendChild(option);
                    }
                }

                // 2. Carrega a lista de TODAS as Marcas e salva localmente
                const resMarcas = await fetch('/api/marcas');
                if (resMarcas.ok) {
                    todasMarcas = await resMarcas.json();
                }
            } catch (error) {
                console.error('Erro ao buscar dados do servidor:', error);
            }

            let confirmacaoModal;

            
            // LÓGICA DE DROPDOWNS DEPENDENTES
            // Ouve as mudanças (quando o usuário escolhe uma opção) no dropdown de Fabricantes.
            document.getElementById('selectFabricante').addEventListener('change', function () {
                const selectMarca = document.getElementById('selectMarca');
                const fabricanteId = this.value; // ID do fabricante recém selecionado.

                // Limpa o segundo dropdown (Marcas) antes de preencher com as novas.
                selectMarca.innerHTML = '<option value="" selected disabled>Escolha uma marca...</option>';

                if (fabricanteId) {
                    let hasMarcas = false;

                    // Filtra o array global "todasMarcas" para achar apenas aquelas que pertencem ao fabricante selecionado.
                    for (let i = 0; i < todasMarcas.length; i++) {
                        const marca = todasMarcas[i];
                        // Compara a chave estrangeira da marca (fk_idFabricante) com o ID do dropdown.
                        if (marca.fk_idFabricante == fabricanteId) {
                            const option = document.createElement('option');
                            option.value = marca.idMarca; // O valor oculto enviado no formulário será o ID.
                            option.textContent = marca.nome_marca; // O texto visível para o usuário.
                            selectMarca.appendChild(option);
                            hasMarcas = true;
                        }
                    }

                    // Se encontrou marcas, habilita o segundo dropdown.
                    if (hasMarcas) {
                        selectMarca.disabled = false;
                    } else {
                        // Se não encontrou, bloqueia o dropdown e avisa o usuário.
                        selectMarca.disabled = true;
                        selectMarca.innerHTML = '<option value="" selected disabled>Nenhuma marca encontrada para este fabricante...</option>';
                    }
                } else {
                    // Estado padrão se nenhum fabricante estiver devidamente selecionado.
                    selectMarca.disabled = true;
                    selectMarca.innerHTML = '<option value="" selected disabled>Primeiro escolha um fabricante...</option>';
                }
            });

            
            document.getElementById('formDesativarMarca').addEventListener('submit', function (e) {
                // Impede o envio padrão e recarregamento da página.
                e.preventDefault();

                const selectMarca = document.getElementById('selectMarca');

                // Garante que uma marca válida foi escolhida no segundo dropdown.
                if (!selectMarca.value) {
                    alert('Por favor, selecione uma marca.');
                    return;
                }

                // Inicializa e exibe o modal (Pop-up) do Bootstrap para confirmar a ação.
                if (!confirmacaoModal) {
                    confirmacaoModal = new bootstrap.Modal(document.getElementById('confirmacaoModal'));
                }
                confirmacaoModal.show();
            });


            // Evento disparado quando o usuário clica no botão "Desativar" dentro do pop-up.
            document.getElementById('btnConfirmarDesativar').addEventListener('click', async function () {
                const selectMarca = document.getElementById('selectMarca');
                const marcaId = parseInt(selectMarca.value); // ID da marca a ser inativada.

                const btnConfirmarDesativar = document.getElementById('btnConfirmarDesativar');
                const originalText = btnConfirmarDesativar.innerHTML; // Salva o texto do botão.

                // Previne múltiplos cliques mudando o botão para o estado de carregamento.
                btnConfirmarDesativar.disabled = true;
                btnConfirmarDesativar.innerHTML = '<span class="spinner-border spinner-border-sm" role="status"></span> Desativando...';

                try {
                    // 1. Resgata as informações originais da marca a partir do array local.
                    let marcaSelecionada = null;
                    for (let i = 0; i < todasMarcas.length; i++) {
                        if (todasMarcas[i].idMarca == marcaId) {
                            marcaSelecionada = todasMarcas[i];
                            break;
                        }
                    }

                    // Se por algum motivo a marca não for encontrada na memória (ex: erro de cache).
                    if (!marcaSelecionada) {
                        throw new Error('Marca não encontrada localmente.');
                    }

                    // 2. Faz a requisição PUT para a API solicitando a alteração.
                    const resUpdateMarca = await fetch(`/api/marcas/${marcaId}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        // Envia os dados antigos da marca, mas altera o status_marca para inativa.
                        body: JSON.stringify({
                            fk_idFabricante: marcaSelecionada.fk_idFabricante,
                            nome_marca: marcaSelecionada.nome_marca,
                            logotipo_marca: marcaSelecionada.logotipo_marca,
                            status_marca: 'Inativo'
                        })
                    });

                    // Verifica se o servidor retornou sucesso.
                    if (resUpdateMarca.ok) {
                        // Fecha o pop-up de confirmação.
                        if (confirmacaoModal) confirmacaoModal.hide();
                        alert('Marca desativada com sucesso!');
                        // Leva o usuário de volta para a visualização geral de marcas.
                        window.location.href = 'visualizar_marca_fabricante.html';
                    } else {
                        throw new Error('Erro ao desativar marca no servidor.');
                    }
                } catch (error) {
                    console.error('Erro:', error);
                    alert('Erro: ' + error.message);
                } finally {
                    // Restaura o botão do pop-up para o estado original em caso de erro.
                    btnConfirmarDesativar.disabled = false;
                    btnConfirmarDesativar.innerHTML = originalText;
                }
            });
        });
    </script>
</body>

</html>
