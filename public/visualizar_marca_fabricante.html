<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marcas e Fabricantes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>

<body style="display: flex; flex-direction: column; min-height: 100vh; margin: 0;">

    <div class="card" style="background-color: #082C38; border-radius: 0;">
        <h5 class="card-header" style="color: white; border-radius: 0;">Marcas e Fabricantes</h5>
    </div>

    <div class="container" style="flex: 1;">
        <nav class="navbar bg-white">
            <form class="w-75 mx-auto" role="search" id="formBusca">
                <div class="input-group">
                    <span class="input-group-text" style="background-color: #FCD8B4; border-right: none;"><i
                            class="bi bi-search"></i></span>
                    <input class="form-control" style="background-color: #FCD8B4; border-left: none;" type="search"
                        placeholder="Buscar nome do fabricante ou marca" aria-label="Pesquisar" id="inputBusca" />
                </div>
            </form>
        </nav>

        <br>

        <div class="d-flex justify-content-between mb-2">
            <div>
                <button class="btn btn-sm btn-outline-success me-2" onclick="window.location.href='nova_marca.html'">Nova marca</button>
                <button class="btn btn-sm btn-outline-secondary me-2" onclick="window.location.href='editar_marca.html'">Editar marca</button>
                <button class="btn btn-sm btn-outline-danger" onclick="window.location.href='desativar_marca.html'">Desativar marca</button>
            </div>
            <div>
                <button class="btn btn-sm btn-outline-success me-2" onclick="window.location.href='cadastro_fabricante.html'">Novo fabricante</button>
                <button class="btn btn-sm btn-outline-secondary me-2" onclick="window.location.href='editar_fabricante.html'">Editar fabricante</button>
                <button class="btn btn-sm btn-outline-danger" onclick="window.location.href='desativar_fabricante.html'">Desativar fabricante</button>
            </div>
        </div>

        <div class="border rounded-4 overflow-hidden shadow-sm">
            <table class="table table-hover table-striped mb-0" id="tabelaMarcasFabricantes">
                <thead>
                    <tr>
                        <th scope="col" class="text-center"
                            style="background-color: #082C38; color: white; border-bottom: none;"></th>
                        <th scope="col" class="text-center"
                            style="background-color: #082C38; color: white; border-bottom: none;">Marca</th>
                        <th scope="col" class="text-center"
                            style="background-color: #082C38; color: white; border-bottom: none;">Fabricante</th>
                    </tr>
                </thead>
                <tbody id="tabelaBody">
                    <!-- Dados carregados via JavaScript -->
                </tbody>
            </table>
        </div>

        <div id="mensagemVazia" class="text-center text-muted py-4" style="display: none;">
            Nenhuma marca ou fabricante ativo encontrado.
        </div>
    </div>

    <footer style="background-color: #082C38; color: white; border-radius: 0; min-height: 2rem;">
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script>
        // Array global usado para armazenar a junção das informações (marcas vinculadas aos fabricantes).
        // Ele funciona como um "cache" para que a barra de pesquisa possa filtrar os resultados instantaneamente sem precisar consultar 
        // o backend toda vez.
        let dadosCompletos = []; 


        // CARREGAMENTO DOS DADOS
        // Dispara a função carregarDados assim que a página terminar de carregar o HTML
        document.addEventListener('DOMContentLoaded', carregarDados);

        async function carregarDados() {
            try {
                // Chama as duas rotas existentes na API em paralelo para ganhar tempo de carregamento
                const resFabricantes = await fetch('/api/fabricantes');
                const resMarcas = await fetch('/api/marcas');

                // Se houver algum erro de rede ou o servidor retornar status 500/404, joga um erro para cair no catch
                if (!resFabricantes.ok || !resMarcas.ok) throw new Error('Erro na requisição');

                // Extrai o conteúdo em formato JSON (arrays de objetos)
                const fabricantes = await resFabricantes.json();
                const marcas = await resMarcas.json();


                // ASSOCIAÇÃO ENTRE MARCAS E FABRICANTES
                // Cria um "dicionário" (mapa) onde a chave é o ID do fabricante e o valor é o seu Nome.
                // Exemplo: { 1: "Coca-Cola" }
                // Torna a busca pelo nome do fabricante mais rápida do que fazer um loop na hora de montar a tabela.
                const mapaFabricantes = {};
                for (let f = 0; f < fabricantes.length; f++) {
                    mapaFabricantes[fabricantes[f].idFabricante] = fabricantes[f].nome_fabricante;
                }

                // Esvazia o array para evitar duplicações caso a função seja chamada novamente
                dadosCompletos = [];
                
                // Percorre a lista de marcas e cria objetos unificados com o nome do fabricante
                for (let m = 0; m < marcas.length; m++) {
                    dadosCompletos.push({
                        // Pega o nome do dicionário usando a chave estrangeira (fk_idFabricante). Se não achar, avisa.
                        nome_fabricante: mapaFabricantes[marcas[m].fk_idFabricante] || 'Fabricante não encontrado',
                        nome_marca: marcas[m].nome_marca,
                        logotipo_marca: marcas[m].logotipo_marca
                    });
                }

                // Envia a lista processada para a função que vai desenhar o HTML na tela
                renderizarTabela(dadosCompletos);
            } catch (error) {
                // Tratamento caso falhe a conexão com a API
                console.error('Erro ao carregar dados:', error);
                document.getElementById('tabelaBody').innerHTML =
                    '<tr><td colspan="3" class="text-center text-danger">' +
                    'Erro ao carregar dados. Verifique se o servidor está rodando.' +
                    '</td></tr>';
            }
        }


        // RENDERIZAÇÃO E MONTAGEM DA TABELA HTML
        function renderizarTabela(dados) {
            const tbody = document.getElementById('tabelaBody'); // O "corpo" da tabela onde ficam as linhas (tr)
            const mensagemVazia = document.getElementById('mensagemVazia');

            // Verifica se não há nenhum registro cadastrado ou filtrado e exibe uma mensagem amigável
            if (dados.length === 0) {
                tbody.innerHTML = ''; // Limpa qualquer vestígio de tabela
                mensagemVazia.style.display = 'block';
                return; // Sai da função mais cedo, já que não há o que renderizar
            }

            // Oculta a mensagem de "vazio" caso haja dados
            mensagemVazia.style.display = 'none';

            let html = ''; // Variável que acumulará o código HTML de todas as linhas

            // Cria uma linha <tr> para cada marca
            for (let i = 0; i < dados.length; i++) {
                const item = dados[i];

                html += '<tr>';

                // Coluna 1: Logotipo (Imagem)
                if (item.logotipo_marca) {
                    // Renderiza a imagem limitando o tamanho para não quebrar o layout da tabela (object-fit: contain)
                    html += '<td class="align-middle text-center"><img src="' + item.logotipo_marca + '" alt="Logo ' + item.nome_marca 
                        + '" style="max-height: 40px; max-width: 80px; object-fit: contain;"></td>';
                } else {
                    // Renderiza um traço neutro caso não haja logotipo
                    html += '<td class="align-middle text-center"><span class="text-muted">—</span></td>';
                }

                // Coluna 2: Nome da Marca
                html += '<td class="align-middle text-center"><strong>' + item.nome_marca + '</strong></td>';

                // Coluna 3: Nome do Fabricante
                html += '<td class="align-middle text-center">' + item.nome_fabricante + '</td>';
                
                html += '</tr>';
            }

            // Injeta o HTML gerado na página, substituindo o que havia antes
            tbody.innerHTML = html;
        }

        // PESQUISA EM TEMPO REAL
        // Evita que apertar "Enter" no formulário de busca recarregue a página
        document.getElementById('formBusca').addEventListener('submit', function (e) {
            e.preventDefault();
            filtrarDados();
        });

        // Ouve cada letra digitada ou apagada no campo de busca para dar a sensação de busca instantânea (tempo real)
        document.getElementById('inputBusca').addEventListener('input', filtrarDados);

        // Lógica de filtragem
        function filtrarDados() {
            // Pega o texto digitado, remove espaços em branco das pontas (trim) e converte para letras minúsculas (toLowerCase)
            const termo = document.getElementById('inputBusca').value.toLowerCase().trim();

            // Se a barra estiver vazia, renderiza a tabela inteira novamente
            if (!termo) {
                renderizarTabela(dadosCompletos);
                return;
            }

            const filtrados = []; // Array temporário para guardar só quem passou no filtro
            
            // Compara o termo digitado com o nome de todos os itens cadastrados
            for (let i = 0; i < dadosCompletos.length; i++) {
                const item = dadosCompletos[i];
                // Includes checa se a palavra (termo) existe em qualquer parte do nome. Ex: "coca" acha "Coca-cola"
                if (item.nome_fabricante.toLowerCase().includes(termo) ||
                    item.nome_marca.toLowerCase().includes(termo)) {
                    filtrados.push(item);
                }
            }

            // Redesenha a tabela mostrando apenas o array filtrado
            renderizarTabela(filtrados);
        }
    </script>

</body>

</html>
