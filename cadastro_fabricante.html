<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Fabricante</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container">
        <b>Cadastro de Fabricante</b>
        <br>
        <br>
        <b>Informações para identificação</b>

        <br>
        <br>

        <fieldset class="column mb-3">
            <legend class="col-form-label col-sm-2 pt-0">Tipo de Pessoa</legend>
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio1" value="option1">
                <label class="form-check-label" for="inlineRadio1">Pessoa Física</label>
            </div>
        
            <div class="form-check form-check-inline">
                <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio2" value="option2">
                <label class="form-check-label" for="inlineRadio2">Pessoa Jurídica</label>
            </div>
        </fieldset>

        <form>
            <div class="row mb-3">
                <label for="inputDocFiscal" class="col-sm-2 col-form-label">Documento Fiscal</label>
                <div class="col-sm-4">
                    <input type="text" class="form-control" id="inputDocFiscal" placeholder="CPF ou CNPJ" required>
                </div>
            </div>
            
            <div class="row mb-3">
                <label for="inputNome" class="col-sm-2 col-form-label">Nome</label>
                <div class="col-sm-4">
                    <input type="text" class="form-control" id="inputNome" placeholder="Nome completo ou razão social" required>
                </div>
            </div>

            <div class="row mb-3">
                <label for="inputTelefone" class="col-sm-2 col-form-label">Telefone</label>
                <div class="col-sm-4">
                    <input type="text" class="form-control" id="inputTelefone" placeholder="+55 |" required>
                </div>
            </div>

            <div class="row mb-3">
                <label for="inputEmail" class="col-sm-2 col-form-label">E-mail</label>
                <div class="col-sm-4">
                    <input type="text" class="form-control" id="inputEmail" placeholder="@email" required>
                </div>
            </div>

            <div class="row mb-3">
                <label for="inputDadosCobranca" class="col-sm-2 col-form-label">Dados de Cobrança</label>
                <div class="col-sm-4">
                    <input type="text" class="form-control" id="inputDadosCobranca" placeholder="CEP" required>
                </div>
            </div>

        </form>

        <form>
            <div class="row gy-2 gx-3 align-items-center">
                <div class="col-auto">
                    <input type="text" class="form-control" id="autoSizingInput" placeholder="Estado" required>
                </div>
                <div class="col-auto">
                    <div class="input-group">
                        <input type="text" class="form-control" id="autoSizingInputGroup" placeholder="Cidade" required>
                    </div>
                </div>
                
                <div class="col-auto">
                    <div class="input-group">
                        <input type="text" class="form-control" id="autoSizingInputGroup" placeholder="Bairro" required>
                    </div>
                </div>
            </div>
        </form>

        <br>
        <div class="row g-3">
            <div class="col-sm-4">
                <input type="text" class="form-control" placeholder="Logradouro" aria-label="Logradouro" required>
            </div>
            <div class="col-sm-3">
                <input type="text" class="form-control" placeholder="Número" aria-label="Número" required>
            </div>
        </div>
        
        <br>

        <div class="col-sm-7">
           <input type="text" class="form-control" placeholder="Complemento" aria-label="Complemento (opcional)"> 
        </div>
        
        <br>

        <hr>

        <div class="form-check">
            <input class="form-check-input" type="checkbox" value="" id="checkDefault" required>
            <label class="form-check-label" for="checkDefault">
                Eu li e concordo com os Termos de Serviços, Políticas de Privacidade
            </label>
        </div>

        <br>

        <div class="col-12">
            <button class="btn btn-primary" type="submit">Enviar</button>
        </div>

    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
